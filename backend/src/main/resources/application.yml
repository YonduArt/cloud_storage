server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cloud_storage}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

app:
  jwt:
    secret: ${JWT_SECRET:VGhpc0lzQVN1cGVyU2VjdXJlSldUU2VjcmV0S2V5Rm9yRGlwbG9tMjAyNg==}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
  storage:
    root: ${STORAGE_ROOT:storage}
    quota-bytes: ${STORAGE_QUOTA_BYTES:1073741824}
  ai-worker:
    url: ${AI_WORKER_URL:http://localhost:8090}
    enabled: ${AI_WORKER_ENABLED:true}
  cors:
    allowed-origin-pattern: ${CORS_ALLOWED_ORIGIN_PATTERN:http://localhost:*}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
